<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRA ENGINE  | FREE ASSET EDITION</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/TransformControls.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    
    <style>
        :root { --ue-bg: #111111; --ue-panel: #1a1a1a; --ue-accent: #3b82f6; --ue-border: #252525; }
        body, html { margin: 0; padding: 0; height: 100vh; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; color: #aaa; }

        /* --- INTRO & CHARACTER SETUP --- */
        .setup-overlay { position: fixed; inset: 0; z-index: 10000; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .card { background: var(--ue-panel); padding: 40px; border: 1px solid var(--ue-border); width: 450px; border-radius: 4px; text-align: center; }
        input, select, .btn-ue { width: 100%; padding: 14px; margin-top: 15px; background: #0d0d0d; border: 1px solid #333; color: #fff; border-radius: 2px; font-family: 'Inter'; box-sizing: border-box; }
        .btn-ue { background: var(--ue-accent); font-weight: bold; border: none; cursor: pointer; color: white; text-transform: uppercase; letter-spacing: 1px; }

        /* --- UE5 LAYOUT --- */
        #editor { display: none; height: 100vh; grid-template-columns: 260px 1fr 280px; grid-template-rows: 40px 1fr 280px; }
        
        header { grid-column: 1 / -1; background: #0a0a0a; border-bottom: 1px solid var(--ue-border); display: flex; align-items: center; padding: 0 20px; font-size: 11px; color: #666; }
        .outliner { background: var(--ue-panel); border-right: 1px solid var(--ue-border); padding: 15px; font-size: 12px; }
        .viewport { background: #050505; position: relative; }
        .details { background: var(--ue-panel); border-left: 1px solid var(--ue-border); padding: 15px; font-size: 12px; }

        /* --- ASSET STORE (CONTENT BROWSER) --- */
        .content-browser { grid-column: 1 / -1; background: #151515; border-top: 2px solid #222; display: flex; flex-direction: column; }
        .browser-header { background: #0d0d0d; padding: 5px 15px; border-bottom: 1px solid #222; font-size: 10px; font-weight: bold; display: flex; gap: 20px; }
        .asset-grid { flex-grow: 1; padding: 20px; display: flex; gap: 15px; overflow-x: auto; align-items: center; }
        
        .asset-card { min-width: 140px; height: 170px; background: #222; border: 1px solid #333; border-radius: 4px; cursor: pointer; text-align: center; padding: 10px; transition: 0.2s; }
        .asset-card:hover { border-color: var(--ue-accent); background: #282828; }
        .asset-card img { width: 100%; height: 90px; object-fit: cover; border-radius: 2px; margin-bottom: 10px; }
        .asset-card span { font-size: 10px; display: block; color: #eee; }
        .asset-card small { font-size: 8px; color: #555; text-transform: uppercase; }

        /* HUD Tools */
        .gizmo-tools { position: absolute; top: 15px; left: 15px; display: flex; gap: 5px; z-index: 50; }
        .tool { background: #2a2a2a; border: 1px solid #444; color: white; padding: 8px 15px; font-size: 10px; cursor: pointer; }
        .tool.active { background: var(--ue-accent); border-color: var(--ue-accent); }
    </style>
</head>
<body>

    <div id="intro-screen" class="setup-overlay">
        <div class="card">
            <h1 style="font-family:'Orbitron'; color:white; letter-spacing:8px; margin-bottom:30px;">ULTRA ENGINE 5</h1>
            <input type="text" id="username" placeholder="DEVELOPER NAME">
            <select id="gender">
                <option value="male">CHARACTER: ADAM (MALE)</option>
                <option value="female">CHARACTER: EVA (FEMALE)</option>
            </select>
            <button class="btn-ue" onclick="launchUE5()">INITIALIZE WORLD</button>
            <p style="font-size: 10px; color: #444; margin-top: 20px;">ALL ASSETS ARE OPEN-SOURCE & FREE</p>
        </div>
    </div>

    <div id="editor">
        <header>
            <span style="color:var(--ue-accent); font-weight:bold;">UE5.2_STABLE</span>
            <span style="margin-left:25px;">User: <span id="display-user" style="color:#fff"></span></span>
        </header>

        <aside class="outliner">
            <p style="color:#555; margin-bottom:10px; font-weight:bold;">OUTLINER</p>
            <div style="color:var(--ue-accent);">● World_Root</div>
            <div style="margin-left:15px; color:#999;">☼ Sun_Light</div>
            <div style="margin-left:15px; color:#999;">🎥 Player_Cam</div>
            <div id="scene-list" style="margin-left:15px; color:#fff;">👤 Player_Character</div>
        </aside>

        <main class="viewport" id="viewport">
            <div class="gizmo-tools">
                <button class="tool active" id="btn-move" onclick="setGizmo('translate')">MOVE (W)</button>
                <button class="tool" id="btn-rotate" onclick="setGizmo('rotate')">ROTATE (E)</button>
            </div>
        </main>

        <aside class="details">
            <p style="color:#555; font-weight:bold;">DETAILS</p>
            <div style="font-size:10px; color:#444; line-height:2;">Select any asset to view its transform, materials, and physics properties.</div>
        </aside>

        <section class="content-browser">
            <div class="browser-header">
                <span style="color:#fff">CONTENT BROWSER</span>
                <span>ASSET STORE (FREE)</span>
            </div>
            <div class="asset-grid">
                </div>
        </section>
    </div>

    <script>
        let scene, camera, renderer, control, player;
        const loader = new THREE.GLTFLoader();

        const freeAssets = [
            { id: 'helmet', name: 'Sci-Fi Helmet', cat: 'Props', img: 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/DamagedHelmet/screenshot/screenshot.png', url: 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/DamagedHelmet/glTF/DamagedHelmet.gltf' },
            { id: 'duck', name: 'Yellow Duck', cat: 'Props', img: 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Duck/screenshot/screenshot.png', url: 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Duck/glTF/Duck.gltf' },
            { id: 'lantern', name: 'Antique Lantern', cat: 'Environment', img: 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Lantern/screenshot/screenshot.png', url: 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Lantern/glTF/Lantern.gltf' },
            { id: 'boombox', name: 'Retro Boombox', cat: 'Electronics', img: 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/BoomBox/screenshot/screenshot.png', url: 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/BoomBox/glTF/BoomBox.gltf' }
        ];

        function launchUE5() {
            const user = document.getElementById('username').value || "Creator_X";
            document.getElementById('display-user').innerText = user;
            document.getElementById('intro-screen').style.display = 'none';
            document.getElementById('editor').style.display = 'grid';
            initEngine();
            loadBrowser();
        }

        function initEngine() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0a);
            const view = document.getElementById('viewport');
            camera = new THREE.PerspectiveCamera(70, view.clientWidth / view.clientHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(view.clientWidth, view.clientHeight);
            renderer.outputEncoding = THREE.sRGBEncoding;
            view.appendChild(renderer.domElement);

            scene.add(new THREE.GridHelper(100, 100, 0x222222, 0x151515));
            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const sun = new THREE.DirectionalLight(0xffffff, 1.5);
            sun.position.set(10, 20, 10);
            scene.add(sun);

            camera.position.set(0, 5, 12);
            control = new THREE.TransformControls(camera, renderer.domElement);
            scene.add(control);

            // Load Player Character (Adam/Eva)
            const gender = document.getElementById('gender').value;
            const charUrl = gender === 'male' ? 
                'https://models.readyplayer.me/6385d5682855f75661642220.glb' : 
                'https://models.readyplayer.me/6385d5bc2855f75661642231.glb';

            loader.load(charUrl, (gltf) => {
                player = gltf.scene;
                player.scale.set(1.8, 1.8, 1.8);
                scene.add(player);
                control.attach(player);
            });

            animate();
        }

        function loadBrowser() {
            const grid = document.querySelector('.asset-grid');
            freeAssets.forEach(a => {
                const card = document.createElement('div');
                card.className = 'asset-card';
                card.innerHTML = `<img src="${a.img}"><small>${a.cat}</small><span>${a.name}</span>`;
                card.onclick = () => spawn(a.url, a.name);
                grid.appendChild(card);
            });
        }

        function spawn(url, name) {
            loader.load(url, (gltf) => {
                const mesh = gltf.scene;
                mesh.position.set(Math.random()*6-3, 0, Math.random()*6-3);
                mesh.scale.set(1.5, 1.5, 1.5);
                scene.add(mesh);
                control.attach(mesh);
                
                const li = document.createElement('div');
                li.innerText = "📦 " + name;
                document.getElementById('scene-list').appendChild(li);
            });
        }

        function setGizmo(mode) {
            control.setMode(mode);
            document.getElementById('btn-move').classList.toggle('active', mode === 'translate');
            document.getElementById('btn-rotate').classList.toggle('active', mode === 'rotate');
        }

        function animate() {
            requestAnimationFrame(animate);
            if(renderer) renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            const v = document.getElementById('viewport');
            renderer.setSize(v.clientWidth, v.clientHeight);
            camera.aspect = v.clientWidth / v.clientHeight;
            camera.updateProjectionMatrix();
        });
    </script>
</body>
</html>
