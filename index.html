<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRA ENGINE | PRO EDITION</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/TransformControls.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --neon: #00f2ff; --panel: rgba(10,10,10,0.98); --dark: #050505; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; color: white; }

        /* --- SETUP SCREENS --- */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10000; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .setup-card { background: var(--panel); padding: 45px; border: 1px solid var(--neon); width: 420px; text-align: center; border-radius: 2px; box-shadow: 0 0 40px rgba(0,242,255,0.15); }
        input[type="text"], select, .btn-prime { width: 100%; padding: 15px; margin-top: 18px; background: #111; border: 1px solid #333; color: white; font-family: 'Orbitron'; outline: none; box-sizing: border-box; }
        .btn-prime { background: var(--neon); color: black; font-weight: 900; border: none; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn-prime:hover { background: white; box-shadow: 0 0 20px white; }

        /* --- ASSET SIDEBAR --- */
        #engine-main { display: none; }
        #sidebar-right { position: fixed; right: 0; top: 0; width: 300px; height: 100%; background: var(--dark); border-left: 1px solid #222; z-index: 100; display: flex; flex-direction: column; }
        .sidebar-title { padding: 20px; font-size: 12px; color: var(--neon); border-bottom: 1px solid #222; letter-spacing: 2px; }
        .asset-list { flex-grow: 1; overflow-y: auto; padding: 15px; }
        .category-label { font-size: 9px; color: #444; margin: 15px 0 8px 0; display: block; letter-spacing: 1px; }
        
        .asset-btn { width: 100%; background: #111; border: 1px solid #222; padding: 12px; margin-bottom: 8px; color: #aaa; text-align: left; font-size: 10px; cursor: pointer; transition: 0.2s; }
        .asset-btn:hover { border-color: var(--neon); color: white; background: #1a1a1a; }

        /* --- HUD --- */
        #hud-top { position: fixed; left: 20px; top: 20px; z-index: 50; display: flex; flex-direction: column; gap: 5px; }
        .status-tag { background: rgba(0,0,0,0.8); padding: 8px 15px; border-left: 3px solid var(--neon); font-size: 11px; }
        .controls-row { margin-top: 15px; display: flex; gap: 10px; }
        .tool-btn { background: #111; border: 1px solid #333; color: white; padding: 8px 12px; cursor: pointer; font-size: 9px; }
        .tool-btn:hover { background: var(--neon); color: black; }
    </style>
</head>
<body>

    <div id="setup-screen" class="overlay">
        <div class="setup-card">
            <h1 style="color:var(--neon); margin-bottom: 30px; letter-spacing: 5px;">ULTRA CORE</h1>
            <input type="text" id="dev-name" placeholder="DEVELOPER ID / NAME" maxlength="12">
            <select id="platform">
                <option>PC / DESKTOP MODE</option>
                <option>MOBILE / OPTIMIZED</option>
            </select>
            <button class="btn-prime" onclick="nextStep()">INITIALIZE</button>
        </div>
    </div>

    <div id="char-screen" class="overlay" style="display:none;">
        <div class="setup-card">
            <h2 style="color:var(--neon); margin-bottom:20px;">SELECT AVATAR</h2>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="asset-btn" onclick="launch('male')" style="text-align:center; padding:20px;">
                    <img src="https://readyplayerme.api.readyplayer.me/v1/avatars/6385d5682855f75661642220.png" style="width:100%; margin-bottom:10px;">
                    ADAM
                </div>
                <div class="asset-btn" onclick="launch('female')" style="text-align:center; padding:20px;">
                    <img src="https://readyplayerme.api.readyplayer.me/v1/avatars/6385d5bc2855f75661642231.png" style="width:100%; margin-bottom:10px;">
                    EVA
                </div>
            </div>
        </div>
    </div>

    <div id="engine-main">
        <div id="hud-top">
            <div class="status-tag">SYSTEM: ONLINE</div>
            <div class="status-tag">DEV: <span id="user-display" style="color:var(--neon)">-</span></div>
            <div class="controls-row">
                <button class="tool-btn" onclick="control.setMode('translate')">MOVE</button>
                <button class="tool-btn" onclick="control.setMode('rotate')">ROTATE</button>
            </div>
        </div>

        <div id="sidebar-right">
            <div class="sidebar-title">ASSET BROWSER</div>
            <div class="asset-list">
                <span class="category-label">CHARACTERS / NPCs</span>
                <button class="asset-btn" onclick="spawn('bot')">Neural Robot</button>
                
                <span class="category-label">SCI-FI PROPS</span>
                <button class="asset-btn" onclick="spawn('helmet')">Cyber Helmet</button>
                <button class="asset-btn" onclick="spawn('cube')">Data Cube</button>
                
                <span class="category-label">ENVIRONMENT</span>
                <button class="asset-btn" onclick="spawn('tree')">Digital Tree</button>
                <button class="asset-btn" onclick="spawn('rock')">Desert Rock</button>
            </div>
        </div>
    </div>

    <script>
        let devName = "DEV";
        let scene, camera, renderer, control, activeObj;
        const loader = new THREE.GLTFLoader();

        function nextStep() {
            devName = document.getElementById('dev-name').value || "DEV";
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('char-screen').style.display = 'flex';
        }

        function launch(gender) {
            document.getElementById('char-screen').style.display = 'none';
            document.getElementById('engine-main').style.display = 'block';
            document.getElementById('user-display').innerText = devName.toUpperCase();
            init3D(gender);
        }

        function init3D(gender) {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020202);
            camera = new THREE.PerspectiveCamera(75, (window.innerWidth - 300) / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth - 300, window.innerHeight);
            renderer.outputEncoding = THREE.sRGBEncoding;
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.GridHelper(60, 60, 0x00f2ff, 0x111111));
            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(5, 15, 5);
            scene.add(sun);

            camera.position.set(0, 4, 8);
            control = new THREE.TransformControls(camera, renderer.domElement);
            scene.add(control);

            // Initial Avatar Load
            const url = gender === 'male' ? 'https://models.readyplayer.me/6385d5682855f75661642220.glb' : 'https://models.readyplayer.me/6385d5bc2855f75661642231.glb';
            loader.load(url, (gltf) => {
                activeObj = gltf.scene;
                activeObj.scale.set(1.5, 1.5, 1.5);
                scene.add(activeObj);
                control.attach(activeObj);
            });

            animate();
        }

        function spawn(type) {
            // Simplified spawning for performance
            if(type === 'cube') {
                const geo = new THREE.BoxGeometry(1.5, 1.5, 1.5);
                const mat = new THREE.MeshStandardMaterial({color: 0x00f2ff, wireframe: true});
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set(Math.random()*4, 1, Math.random()*4);
                scene.add(mesh);
                control.attach(mesh);
                return;
            }
            
            // Model spawning (Placeholder URLs)
            const modelUrl = type === 'helmet' ? 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/DamagedHelmet/glTF/DamagedHelmet.gltf' : 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/BrainStem/glTF/BrainStem.gltf';
            loader.load(modelUrl, (gltf) => {
                const item = gltf.scene;
                item.position.set(Math.random()*4, 0, Math.random()*4);
                item.scale.set(1.5, 1.5, 1.5);
                scene.add(item);
                control.attach(item);
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            if(renderer) renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth - 300, window.innerHeight);
            camera.aspect = (window.innerWidth - 300) / window.innerHeight;
            camera.updateProjectionMatrix();
        });
    </script>
</body>
</html>
