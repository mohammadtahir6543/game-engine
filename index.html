<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRA ENGINE | CREATOR EDITION</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/TransformControls.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --neon: #00f2ff; --panel: rgba(10,10,10,0.95); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; color: white; }

        /* --- SETUP & CHAR SELECT --- */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10000; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .setup-card { background: var(--panel); padding: 40px; border: 1px solid var(--neon); width: 450px; text-align: center; border-radius: 8px; }
        .btn-prime { width: 100%; padding: 15px; margin-top: 20px; background: var(--neon); color: black; font-weight: 900; border: none; cursor: pointer; font-family: 'Orbitron'; }
        
        .char-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .char-card { border: 1px solid #333; padding: 10px; cursor: pointer; text-align: center; }
        .char-card:hover { border-color: var(--neon); }
        .char-card img { width: 100%; height: 180px; object-fit: cover; }

        /* --- ENGINE & CUSTOMIZER --- */
        #engine-main { display: none; }
        #sidebar-right { position: fixed; right: 0; top: 0; width: 300px; height: 100%; background: #080808; border-left: 1px solid #222; z-index: 100; overflow-y: auto; }
        .panel-section { padding: 20px; border-bottom: 1px solid #222; }
        .control-group { margin-bottom: 15px; }
        .control-group label { display: block; font-size: 10px; color: #777; margin-bottom: 5px; }
        input[type="color"] { width: 100%; height: 30px; background: none; border: 1px solid #333; cursor: pointer; }

        #hud { position: fixed; left: 20px; top: 20px; z-index: 50; background: var(--panel); padding: 20px; border: 1px solid #333; }
    </style>
</head>
<body>

    <audio id="start-snd" src="https://assets.mixkit.co/sfx/preview/mixkit-futuristic-robotic-voice-2444.mp3"></audio>

    <div id="setup-screen" class="overlay">
        <div class="setup-card">
            <h1 style="color:var(--neon); letter-spacing:5px;">ULTRA ENGINE</h1>
            <select id="platform" style="width:100%; padding:15px; background:#111; color:white; border:1px solid #333;">
                <option>TARGET: PC / DESKTOP</option>
                <option>TARGET: MOBILE / WEB</option>
            </select>
            <button class="btn-prime" onclick="playSnd(); showCharSelect()">INITIALIZE SYSTEM</button>
        </div>
    </div>

    <div id="char-selection" class="overlay" style="display:none;">
        <div class="setup-card">
            <h2 style="color:var(--neon)">SELECT BASE IDENTITY</h2>
            <div class="char-grid">
                <div class="char-card" onclick="launchEngine('male')">
                    <img src="https://readyplayerme.api.readyplayer.me/v1/avatars/6385d5682855f75661642220.png">
                    <p>ADAM</p>
                </div>
                <div class="char-card" onclick="launchEngine('female')">
                    <img src="https://readyplayerme.api.readyplayer.me/v1/avatars/6385d5bc2855f75661642231.png">
                    <p>EVA</p>
                </div>
            </div>
        </div>
    </div>

    <div id="engine-main">
        <div id="hud">
            <p style="font-size:10px; color:var(--neon); margin:0;">SYSTEM: ACTIVE</p>
            <button onclick="control.setMode('translate')" class="btn-prime" style="padding:10px; margin-top:10px;">MOVE</button>
            <button onclick="control.setMode('rotate')" class="btn-prime" style="padding:10px; margin-top:5px;">ROTATE</button>
        </div>

        <div id="sidebar-right">
            <div class="panel-section">
                <h3 style="font-size:12px; color:var(--neon);">CHARACTER CUSTOMIZER</h3>
                <div class="control-group">
                    <label>SKIN TONE</label>
                    <input type="color" id="skinColor" oninput="updateChar('Skin', this.value)">
                </div>
                <div class="control-group">
                    <label>TOP CLOTHING</label>
                    <input type="color" id="topColor" oninput="updateChar('Top', this.value)">
                </div>
                <div class="control-group">
                    <label>BOTTOM CLOTHING</label>
                    <input type="color" id="bottomColor" oninput="updateChar('Bottom', this.value)">
                </div>
            </div>
            
            <div class="panel-section">
                <h3 style="font-size:12px; color:var(--neon);">OBJECTS</h3>
                <button onclick="spawn('helmet')" class="btn-prime" style="background:#111; color:white; border:1px solid #333;">SPAWN HELMET</button>
            </div>
        </div>
    </div>

    <script>
        const snd = document.getElementById('start-snd');
        function playSnd() { snd.play(); }

        function showCharSelect() {
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('char-selection').style.display = 'flex';
        }

        function launchEngine(gender) {
            document.getElementById('char-selection').style.display = 'none';
            document.getElementById('engine-main').style.display = 'block';
            init3D(gender);
        }

        let scene, camera, renderer, control, player;

        function init3D(gender) {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020202);
            camera = new THREE.PerspectiveCamera(75, (window.innerWidth - 300) / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth - 300, window.innerHeight);
            renderer.outputEncoding = THREE.sRGBEncoding;
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.GridHelper(50, 50, 0x00f2ff, 0x111111));
            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const sun = new THREE.DirectionalLight(0xffffff, 1.5);
            sun.position.set(5, 10, 5);
            scene.add(sun);

            camera.position.set(0, 2, 5);
            control = new THREE.TransformControls(camera, renderer.domElement);
            scene.add(control);

            const loader = new THREE.GLTFLoader();
            const url = gender === 'male' ? 'https://models.readyplayer.me/6385d5682855f75661642220.glb' : 'https://models.readyplayer.me/6385d5bc2855f75661642231.glb';
            
            loader.load(url, (gltf) => {
                player = gltf.scene;
                player.scale.set(1.5, 1.5, 1.5);
                scene.add(player);
                control.attach(player);
            });

            animate();
        }

        function updateChar(part, color) {
            if(!player) return;
            player.traverse((child) => {
                if(child.isMesh && child.name.includes(part)) {
                    child.material.color.set(color);
                }
            });
        }

        function spawn(type) {
            const loader = new THREE.GLTFLoader();
            loader.load('https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/DamagedHelmet/glTF/DamagedHelmet.gltf', (gltf) => {
                const item = gltf.scene;
                item.position.x = 2;
                scene.add(item);
                control.attach(item);
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            if(renderer) renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth - 300, window.innerHeight);
            camera.aspect = (window.innerWidth - 300) / window.innerHeight;
            camera.updateProjectionMatrix();
        });
    </script>
</body>
</html>
