<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRA ENGINE | THE ECOSYSTEM</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/TransformControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #00f2ff; --bg: #000; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; color: white; }

        /* --- 1. NEW CINEMATIC INTRO --- */
        #intro-sequence {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 10000; display: flex; align-items: center; justify-content: center;
        }
        .intro-title {
            font-family: 'Syncopate', sans-serif; font-size: clamp(20px, 5vw, 60px);
            letter-spacing: 20px; color: white; text-align: center;
            animation: pulse 2.5s ease-in-out forwards; opacity: 0;
        }
        @keyframes pulse {
            0% { opacity: 0; transform: scale(0.8); filter: blur(10px); }
            50% { opacity: 1; filter: blur(0px); letter-spacing: 25px; }
            100% { opacity: 0; transform: scale(1.1); letter-spacing: 30px; }
        }

        /* --- 2. SETUP SCREEN --- */
        #setup-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #0a0a0a 0%, #000 100%);
            z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .setup-box {
            background: rgba(15,15,15,0.9); padding: 40px; border-radius: 2px;
            border-top: 4px solid var(--accent); width: 450px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,1);
        }
        select, .start-btn {
            width: 100%; padding: 15px; background: #111; border: 1px solid #333;
            color: white; border-radius: 4px; margin-top: 15px; font-family: 'Orbitron';
        }
        .start-btn { background: var(--accent); color: black; font-weight: 900; cursor: pointer; border: none; }

        /* --- 3. ENGINE UI --- */
        #main-engine { display: none; }
        #sidebar {
            position: fixed; right: 0; top: 0; width: 320px; height: 100%;
            background: #080808; border-left: 1px solid #222; z-index: 100;
        }
        .store-link-card {
            margin: 20px; padding: 25px; background: linear-gradient(135deg, #111, #001a1c);
            border: 1px solid var(--accent); border-radius: 8px; text-align: center;
            box-shadow: 0 0 15px rgba(0,242,255,0.1);
        }
        .market-btn {
            display: inline-block; margin-top: 15px; padding: 10px 20px;
            background: var(--accent); color: black; text-decoration: none;
            font-weight: bold; font-size: 12px; border-radius: 4px;
        }

        #hud { position: fixed; left: 20px; top: 20px; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 8px; border: 1px solid #222; }
    </style>
</head>
<body>

    <div id="intro-sequence">
        <div class="intro-title">ULTRA GAMING</div>
    </div>

    <div id="setup-screen">
        <div class="setup-box">
            <h2 style="letter-spacing:5px; color:var(--accent);">PROJECT CONFIG</h2>
            <select id="platform">
                <option value="pc">PC / DESKTOP MODE</option>
                <option value="mobile">MOBILE / LITE MODE</option>
            </select>
            <select id="mode">
                <option value="nocode">VISUAL ENGINE (NO-CODE)</option>
                <option value="script">DEVELOPER MODE (SCRIPTING)</option>
            </select>
            <button class="start-btn" onclick="startEngine()">LAUNCH ENGINE</button>
        </div>
    </div>

    <div id="main-engine">
        <div id="hud">
            <p style="font-size:10px; color:var(--accent); margin:0;">ENGINE STATUS: ACTIVE</p>
            <button onclick="control.setMode('translate')" style="width:100%; margin-top:10px; background:none; border:1px solid #444; color:white; padding:5px; cursor:pointer;">MOVE</button>
            <button onclick="control.setMode('rotate')" style="width:100%; margin-top:5px; background:none; border:1px solid #444; color:white; padding:5px; cursor:pointer;">ROTATE</button>
            <button onclick="save()" style="width:100%; margin-top:15px; background:#28a745; border:none; padding:10px; cursor:pointer; font-weight:bold;">SAVE TO CLOUD</button>
        </div>

        <div id="sidebar">
            <div class="store-link-card">
                <h3 style="margin:0; font-size:14px; color:var(--accent);">ULTRA ASSET MARKET</h3>
                <p style="font-size:10px; color:#666; margin-top:10px;">Browse 10,000+ High Quality 3D Models, Textures, and Scripts.</p>
                <a href="https://github.com/KhronosGroup/glTF-Sample-Models" target="_blank" class="market-btn">OPEN ASSET MARKET ↗</a>
            </div>
            
            <div style="padding:20px;">
                <p style="font-size:11px; color:#444;">LOCAL ASSETS</p>
                <div style="background:#111; padding:15px; border-radius:5px; cursor:pointer; border:1px solid #222;" onclick="spawn('helmet')">
                    <span style="font-size:12px;">SC-FI HELMET (PREVIEW)</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Intro Timeline
        setTimeout(() => {
            document.getElementById('intro-sequence').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro-sequence').style.display = 'none';
                document.getElementById('setup-screen').style.display = 'flex';
            }, 1000);
        }, 2500);

        function startEngine() {
            document.getElementById('setup-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('setup-screen').style.display = 'none';
                document.getElementById('main-engine').style.display = 'block';
                initThree();
            }, 1000);
        }
