<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Engine Pro</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; }
        #ui-panel {
            position: fixed; left: 0; top: 0; width: 200px; height: 100%;
            background: rgba(20, 20, 20, 0.9); border-right: 2px solid #00adb5;
            display: flex; flex-direction: column; padding: 20px; z-index: 10;
        }
        h2 { color: #00adb5; font-size: 18px; margin-bottom: 20px; }
        button {
            background: #222; color: #fff; border: 1px solid #444;
            padding: 12px; margin-bottom: 10px; cursor: pointer; border-radius: 5px;
            transition: 0.3s; font-weight: bold;
        }
        button:hover { background: #00adb5; color: #000; }
        .save-btn { background: #28a745; border: none; margin-top: auto; }
        #instructions {
            position: fixed; bottom: 20px; right: 20px; color: #fff;
            background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px;
        }
    </style>
</head>
<body>

    <div id="ui-panel">
        <h2>ENGINE PANEL</h2>
        <button onclick="addBox()">+ Add 3D Object</button>
        <button onclick="alert('Templates coming soon!')">Realistic Templates</button>
        <button onclick="alert('Logic Editor Loading...')">No-Code Logic</button>
        <button class="save-btn" onclick="saveToCloud()">Cloud Save (Supabase)</button>
    </div>

    <div id="instructions">Use <b>W, A, S, D</b> to Move Box</div>

    <script>
        // 1. THREE.JS SETUP
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.PointLight(0xffffff, 1, 100);
        light.position.set(10, 10, 10);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        camera.position.z = 5;

        let mesh; 
        function addBox() {
            if(mesh) scene.remove(mesh);
            const geometry = new THREE.BoxGeometry(1, 1, 1);
            const material = new THREE.MeshStandardMaterial({ color: 0x00adb5 });
            mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);
        }
        addBox();

        // 2. SUPABASE SETUP (MAINE AAPKI KEY DAAL DI HAI)
        const SUPABASE_URL = "https://fhqmmfhieowoplsiuiah.supabase.co";
        const SUPABASE_KEY = "sb_publishable_0nvjZi6vah6d0qoLwQyH6g_jIuzR..."; // I have used your key from screenshot
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function saveToCloud() {
            if(!mesh) return alert("Add a box first!");
            const pos = { x: mesh.position.x, y: mesh.position.y, z: mesh.position.z };
            
            const { data, error } = await _supabase
                .from('user_games')
                .insert([{ game_state: pos }]);

            if (error) alert("Error: " + error.message);
            else alert("Game Saved to Cloud! ☁️");
        }

        // 3. MOVEMENT CONTROLS
        window.addEventListener('keydown', (e) => {
            if(!mesh) return;
            const speed = 0.2;
            if(e.key.toLowerCase() === 'w') mesh.position.y += speed;
            if(e.key.toLowerCase() === 's') mesh.position.y -= speed;
            if(e.key.toLowerCase() === 'a') mesh.position.x -= speed;
            if(e.key.toLowerCase() === 'd') mesh.position.x += speed;
        });

        // 4. ANIMATION LOOP
        function animate() {
            requestAnimationFrame(animate);
            if(mesh) {
                mesh.rotation.x += 0.01;
                mesh.rotation.y += 0.01;
            }
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        });
    </script>
</body>
</html>
