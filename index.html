<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRA ENGINE | UE5 EDITION</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/TransformControls.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    
    <style>
        :root { --ue-bg: #151515; --ue-panel: #1e1e1e; --ue-accent: #3b82f6; --ue-border: #2a2a2a; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; color: #ccc; }

        /* --- CINEMATIC INTRO --- */
        #intro-layer { position: fixed; inset: 0; z-index: 10000; background: #000; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        #intro-layer h1 { font-family: 'Orbitron'; font-size: 50px; color: #fff; letter-spacing: 15px; text-shadow: 0 0 30px rgba(59, 130, 246, 0.5); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(0.98); } }

        /* --- SETUP SCREEN --- */
        #setup-screen { position: fixed; inset: 0; z-index: 9999; background: #0a0a0a; display: none; align-items: center; justify-content: center; }
        .setup-box { background: var(--ue-panel); border: 1px solid var(--ue-border); padding: 40px; width: 400px; text-align: center; border-radius: 4px; }
        input, select, .launch-btn { width: 100%; padding: 12px; margin-top: 15px; background: #111; border: 1px solid var(--ue-border); color: #fff; outline: none; border-radius: 4px; }
        .launch-btn { background: var(--ue-accent); font-weight: bold; border: none; cursor: pointer; transition: 0.3s; }
        .launch-btn:hover { background: #2563eb; }

        /* --- UE5 INTERFACE --- */
        #main-editor { display: none; grid-template-columns: 250px 1fr 280px; grid-template-rows: 40px 1fr 250px; height: 100vh; width: 100vw; background: var(--ue-bg); }
        
        header { grid-column: 1 / -1; background: #111; border-bottom: 1px solid var(--ue-border); display: flex; align-items: center; padding: 0 20px; font-size: 11px; }
        
        .outliner { background: var(--ue-panel); border-right: 1px solid var(--ue-border); padding: 10px; font-size: 12px; }
        .viewport { background: #000; position: relative; overflow: hidden; }
        .details { background: var(--ue-panel); border-left: 1px solid var(--ue-border); padding: 10px; font-size: 12px; }

        /* --- ASSET STORE (CONTENT DRAWER) --- */
        .content-drawer { grid-column: 1 / -1; background: #181818; border-top: 2px solid var(--ue-border); padding: 15px; display: flex; flex-direction: column; }
        .asset-grid { display: flex; gap: 20px; overflow-x: auto; padding-bottom: 10px; }
        .asset-item { min-width: 140px; height: 160px; background: #222; border-radius: 4px; border: 1px solid var(--ue-border); cursor: pointer; transition: 0.3s; text-align: center; padding: 10px; }
        .asset-item:hover { border-color: var(--ue-accent); background: #2a2a2a; }
        .asset-item img { width: 100%; height: 90px; object-fit: cover; border-radius: 2px; margin-bottom: 8px; }
        .asset-item span { font-size: 10px; font-weight: bold; color: #888; }

        /* HUD Buttons */
        .viewport-tools { position: absolute; top: 15px; left: 15px; display: flex; gap: 10px; }
        .tool-btn { background: #2a2a2a; border: 1px solid #444; color: white; padding: 6px 12px; font-size: 10px; cursor: pointer; }
        .tool-btn.active { background: var(--ue-accent); border-color: var(--ue-accent); }
    </style>
</head>
<body>

    <div id="intro-layer" onclick="showSetup()">
        <h1>ULTRA ENGINE</h1>
        <p style="position:absolute; bottom:50px; color:#555; letter-spacing:2px;">CLICK TO START SESSION</p>
    </div>

    <div id="setup-screen">
        <div class="setup-box">
            <h2 style="margin-top:0; color:#fff;">PROJECT SETTINGS</h2>
            <input type="text" id="dev-name" placeholder="DEVELOPER NAME">
            <select id="platform">
                <option>PC / HIGH-END RENDERING</option>
                <option>MOBILE / OPTIMIZED</option>
            </select>
            <div style="margin-top:20px; text-align:left; font-size:11px;">
                <label>SELECT STARTING CHARACTER:</label>
                <select id="char-choice">
                    <option value="male">ADAM (MALE)</option>
                    <option value="female">EVA (FEMALE)</option>
                </select>
            </div>
            <button class="launch-btn" onclick="launchEngine()">LAUNCH EDITOR</button>
        </div>
    </div>

    <div id="main-editor">
        <header>
            <span style="color:var(--ue-accent); font-weight:bold;">ULTRA ENGINE 5.0</span>
            <span style="margin-left:30px; color:#666;">| Developer: <span id="id-tag" style="color:#eee"></span></span>
        </header>

        <aside class="outliner">
            <p style="color:#666; margin-bottom:10px;">WORLD OUTLINER</p>
            <div style="color:var(--ue-accent);">● Scene_Root</div>
            <div style="margin-left:15px;">☼ Global_Light</div>
            <div style="margin-left:15px;">🎥 Main_Camera</div>
            <div id="object-list" style="margin-left:15px;">📦 Player_Mesh</div>
        </aside>

        <main class="viewport" id="viewport">
            <div class="viewport-tools">
                <button class="tool-btn active" onclick="setTool('translate')">MOVE (W)</button>
                <button class="tool-btn" onclick="setTool('rotate')">ROTATE (E)</button>
            </div>
        </main>

        <aside class="details">
            <p style="color:#666;">DETAILS</p>
            <div id="prop-info" style="font-size:10px; line-height:2;">Select an object to see properties...</div>
        </aside>

        <section class="content-drawer">
            <p style="margin:0 0 10px 0; font-size:11px; font-weight:bold; color:#555;">CONTENT BROWSER / ASSET STORE</p>
            <div class="asset-grid">
                <div class="asset-item" onclick="spawn('helmet')">
                    <img src="https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/DamagedHelmet/screenshot/screenshot.png">
                    <span>Sci-Fi Helmet</span>
                </div>
                <div class="asset-item" onclick="spawn('duck')">
                    <img src="https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Duck/screenshot/screenshot.png">
                    <span>Industrial Duck</span>
                </div>
                <div class="asset-item" onclick="spawn('lantern')">
                    <img src="https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Lantern/screenshot/screenshot.png">
                    <span>Vintage Lantern</span>
                </div>
                <div class="asset-item" onclick="spawn('boombox')">
                    <img src="https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/BoomBox/screenshot/screenshot.png">
                    <span>Cyber Audio</span>
                </div>
            </div>
        </section>
    </div>

    <script>
        let scene, camera, renderer, control, player;
        const loader = new THREE.GLTFLoader();

        function showSetup() {
            document.getElementById('intro-layer').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro-layer').style.display = 'none';
                document.getElementById('setup-screen').style.display = 'flex';
            }, 500);
        }

        function launchEngine() {
            const name = document.getElementById('dev-name').value || "Guest_Dev";
            document.getElementById('id-tag').innerText = name;
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('main-editor').style.display = 'grid';
            init3D();
        }

        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0a);
            
            const viewport = document.getElementById('viewport');
            camera = new THREE.PerspectiveCamera(75, viewport.clientWidth / viewport.clientHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(viewport.clientWidth, viewport.clientHeight);
            renderer.outputEncoding = THREE.sRGBEncoding;
            viewport.appendChild(renderer.domElement);

            const grid = new THREE.GridHelper(100, 100, 0x333333, 0x222222);
            scene.add(grid);
            
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const light = new THREE.DirectionalLight(0xffffff, 1.5);
            light.position.set(10, 20, 10);
            scene.add(light);

            camera.position.set(0, 5, 10);
            control = new THREE.TransformControls(camera, renderer.domElement);
            scene.add(control);

            // Spawn selected character
            const gender = document.getElementById('char-choice').value;
            const charUrl = gender === 'male' ? 'https://models.readyplayer.me/6385d5682855f75661642220.glb' : 'https://models.readyplayer.me/6385d5bc2855f75661642231.glb';
            
            loader.load(charUrl, (gltf) => {
                player = gltf.scene;
                player.scale.set(1.5, 1.5, 1.5);
                scene.add(player);
                control.attach(player);
            });

            animate();
        }

        const library = {
            helmet: 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/DamagedHelmet/glTF/DamagedHelmet.gltf',
            duck: 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Duck/glTF/Duck.gltf',
            lantern: 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Lantern/glTF/Lantern.gltf',
            boombox: 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/BoomBox/glTF/BoomBox.gltf'
        };

        function spawn(type) {
            loader.load(library[type], (gltf) => {
                const mesh = gltf.scene;
                mesh.position.set(Math.random()*5, 0, Math.random()*5);
                mesh.scale.set(1.5, 1.5, 1.5);
                scene.add(mesh);
                control.attach(mesh);
                
                // Add to outliner
                const entry = document.createElement('div');
                entry.innerText = '📦 ' + type.toUpperCase();
                document.getElementById('object-list').appendChild(entry);
            });
        }

        function setTool(mode) {
            control.setMode(mode);
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        }

        function animate() {
            requestAnimationFrame(animate);
            if(renderer) renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            const v = document.getElementById('viewport');
            renderer.setSize(v.clientWidth, v.clientHeight);
            camera.aspect = v.clientWidth / v.clientHeight;
            camera.updateProjectionMatrix();
        });
    </script>
</body>
</html>
